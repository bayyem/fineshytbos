<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vita Note</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  color: #38bdf8;
}

#note {
  width: 100%;
  height: 300px;
  background: #020617;
  color: #e2e8f0;
  border: 1px solid #38bdf8;
  padding: 10px;
  border-radius: 6px;
}

.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 10px;
  color: #94a3b8;
}
</style>

</head>
<body>

<h2>📝 Vita Note</h2>

<textarea id="note" placeholder="langsung ketik aja..."></textarea>

<div class="footer">Auto Save Mode ⚡</div>

<script>
let note = document.getElementById("note");

// auto save tiap ngetik
note.addEventListener("input", function(){
  localStorage.setItem("vitanote", note.value);
});

// auto load tiap 2 detik
function load(){
  note.value = localStorage.getItem("vitanote") || "";
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
