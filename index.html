<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vita Chat</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  color: #38bdf8;
}

#chat {
  width: 100%;
  height: 220px;
  background: #020617;
  color: #e2e8f0;
  border: 1px solid #38bdf8;
  padding: 8px;
  border-radius: 6px;
}

#msg {
  width: 70%;
  padding: 8px;
  border: none;
  border-radius: 6px;
  margin-top: 8px;
}

button {
  width: 25%;
  padding: 8px;
  background: #38bdf8;
  color: black;
  border: none;
  border-radius: 6px;
}

.footer {
  text-align: center;
  font-size: 12px;
  margin-top: 10px;
  color: #94a3b8;
}
</style>

</head>
<body>

<h2>💬 Vita Chat</h2>

<textarea id="chat" readonly></textarea><br>

<input id="msg" placeholder="ketik pesan...">
<button onclick="send()">Kirim</button>

<div class="footer">PS Vita Ready ⚡</div>

<script>
let chat = document.getElementById("chat");

function send(){
  let msg = document.getElementById("msg");
  chat.value += "\n> " + msg.value;
  msg.value = "";
  localStorage.setItem("chatlog", chat.value);
}

function load(){
  chat.value = localStorage.getItem("chatlog") || "";
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
