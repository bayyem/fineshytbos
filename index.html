<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vita Sync Note</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px;
}

#note {
  width: 100%;
  height: 300px;
  background: #020617;
  color: white;
  border: 1px solid #38bdf8;
  padding: 10px;
}
</style>
</head>

<body>

<h3>📝 Vita Sync Note</h3>

<textarea id="note" placeholder="langsung ketik..."></textarea>

<script>
const BIN_ID = 69c3a943c3097a1dd55a481e;
const API_KEY = $2a$10$A7piBO.rLNIYBsSMjngiBuZ1/KIqb8s6nt67wsIbEHpMl3gDtEin.;

let note = document.getElementById("note");

// LOAD dari server
async function load(){
  let res = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
    headers: {
      "X-Master-Key": API_KEY
    }
  });
  let data = await res.json();
  note.value = data.record.text || "";
}

// SAVE ke server
async function save(){
  await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ text: note.value })
  });
}

// auto save tiap ngetik
note.addEventListener("input", function(){
  save();
});

// auto sync tiap 3 detik
setInterval(load, 3000);

// pertama load
load();
</script>

</body>
</html>
